[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = ["npm install -g pnpm@10", "pnpm install --no-frozen-lockfile"]

[phases.build]
cmds = [
  "BASE_PATH=/ pnpm --filter @workspace/slideo run build",
  "pnpm --filter @workspace/api-server run build"
]

[phases.build.env]
NODE_ENV = "production"

[start]
cmd = "node --enable-source-maps artifacts/api-server/dist/index.mjs"
